# Pipeline Configuration
pdf:
  extraction:
    method: "auto"
    page_size: "A4"
  quality: "high"

cleaning:
  remove_whitespace: true
  normalize_tabs: true
  remove_page_numbers: true
  remove_footnotes: true
  unicode_normalization: "NFKC"

chunking:
  strategy: "semantic"
  max_chunk_size: 500
  overlap: 50

export:
  formats:
    - "txt"
    - "html"
  encoding: "utf-8"

ocr:
  enabled: true
  language: "eng"
  dpi: 2.0
